<!DOCTYPE html>
<html dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود یا ثبت نام</title>
  <link rel="stylesheet" href="src/css/output.css">
</head>

<body class="bg-[#D7D7D7] w-screen h-screen">
  <!--wrapper-->
  <div class="wrapper w-max-[1016px] w-full h-full flex justify-center items-center">
    <div class="main-div w-[1016px] h-[856px] bg-white rounded-r-[8px] rounded-l-[16px] overflow-hidden flex ">
      <div class="main-div-right lg:w-[660px] w-[1016px] h-[856px]">
        <a href="../Home Page/index.html"><img class="w-[151.28px] h-[59px] mt-[32px] mx-auto" src="src/images/Logo.svg"
            alt=""></a>
        <div class="w-fit mt-[233px] mx-auto font-estedad text-[20px] text-[#494949] font-bold">ورود یا ثبت‌نام</div>
        <div class="w-fit mt-[30px] mx-auto font-estedad text-[14px] text-[#494949]">کد تایید به شماره موبایلی که وارد
          می‌کنید، ارسال خواهد شد.</div>
        <div
          class="number w-[536px] h-[48px] mt-[16px] mx-auto font-estedad text-[14px flex gap-x-[8px] justify-center items-center px-[8px] py-[10px] rounded-[8px] border-[1px] border-[#C2C2C2]">
          <input dir="ltr" class="number-right w-[448px] h-[24px] gap-x-[10px]" placeholder="۹********">

          <div><img class="w-24px h-[24px] border-[1px] border-white" src="src/images/Flag.svg" alt=""></div>
        </div>
        <div class="rules mt-[32px] w-[536px] mx-auto flex items-center gap-x-[12px]">
          <input class="w-[15px] h-[15px]" type="checkbox" name="check-rules" id="check-rules">
          <label class="font-estedad text-[14px] text-[#727272]" for="check-rules">با ورود و ثبت‌نام در سایت، با <a
              href="" class="text-[#194BF0]">قوانین اتورنت</a> موافقت می‌کنم.</label>
        </div>
        <a href="">
          <div
            class="accept w-[556px] h-[48px] mx-auto mt-[14px] rounded-[8px] flex justify-center items-center bg-[#F3F3F3] text-[#C2C2C2] font-estedad text-[14px]">
            تایید و ادامه</div>
        </a>

      </div>
      <div class="main-div-left w-[356px] h-[855px] lg:flex hidden"><img class="w-full h-full"
          src="src/images/banner.png" alt=""></div>
    </div>
  </div>

  <!--end wrapper-->
